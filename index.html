<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
                
        .container{
            padding: 30px;
            background:linear-gradient(90deg,yellow,green);
            border-radius:20px;
            border:2px solid #000000;
        }
        
        .list {
            display: flex;
            gap: 10px;
            height: 300px;
            list-style: none;
            margin-bottom:20px;
        }
        
        .item {
            width: 150px;
            border-radius:15px;
            display:flex;
            justify-content:center;
            align-items:flex-end;
            padding-bottom:15px;
        }
        
        .item button{
            border:none;
            padding:6px 12px;
            border-radius:6px;
            background:rgba(255,255,255,0.3);
            color:white;
            cursor:pointer;
        }
        
        .generetor {
            width:100%;
            padding:15px;
            border:none;
            border-radius:12px;
            background:linear-gradient(90deg,#1100ff,#00e5ff);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }
        
    </style>
    
</head>
<body>
    <div class="container">
        <ul class="list">
            
            <li class="item"></li>
        </ul>
        <button class="generetor">🎲 YANGI RANGLAR (qulflanganlari saqlanadi)</button>
    </div>
    
    <script>
        const list = document.querySelector(".list")
        
        function render(){
            list.innerHTML = ""
            for(let i = 0; i < 6; i++){
                let color = randomColor()
                let li = document.createElement("li")
                li.classList.add("item")
                li.style.backgroundColor = color
                
                let btn = document.createElement("button")
                btn.innerHTML = color
                
                btn.onclick = () => {
                    let item = btn.innerHTML
                    navigator.clipboard.writeText(item)
                    
                    btn.innerHTML = "✓"
                    
                    setTimeout(() => {
                        btn.innerHTML = item
                    },1000)
                    
                }
                
                li.appendChild(btn)
                
                
                
                
                
                
                list.appendChild(li)
            }
        }
        
        function randomColor() {
            return "#" + Math.floor(Math.random() * 0xffffff).toString(16)
        }
        
        const generetor = document.querySelector(".generetor")
        
        generetor.onclick = () => {
            render()
        }
        
        render()
        
    </script>
</body>
</html>
